[target.xtensa-esp32s3-none-elf]
runner = "espflash flash --monitor -p /dev/cu.usbmodem5B5F1229581"
rustflags = [
    "-C", "link-arg=-nostartfiles",
    "-C", "link-arg=-Tlinkall.x",
]

[build]
target = "xtensa-esp32s3-none-elf"

[unstable]
build-std = ["core", "alloc"]

[env]
# Disable the Xtensa `waiti` low-power sleep in the Embassy executor.
# Wokwi does not properly resume CPU execution after `waiti 0`, so timers
# would hang forever. On real hardware this can be re-enabled for lower
# power consumption.
ESP_HAL_EMBASSY_CONFIG_LOW_POWER_WAIT = "false"

# Enable INFO level logging to see WiFi connection status and IP address
RUST_LOG = "info"

# WiFi credentials - set these to your network
WIFI_SSID = "WLAN14192654"
WIFI_PASSWORD = "xssaMcTc5kjf"
